<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <style>
    body {
      display: flex;
    }
    .sidebar {
      width: 220px;
      height: 100vh;
      background: #343a40;
      padding-top: 30px;
      position: fixed;
      left: 0;
    }
    .sidebar a {
      color: #ffffff;
      padding: 15px;
      display: block;
      text-decoration: none;
    }
    .sidebar a:hover, .sidebar .active {
      background: #495057;
    }
    .main-content {
      margin-left: 220px;
      padding: 30px;
      width: 100%;
    }
    .card {
      cursor: pointer;
      transition: 0.3s;
    }
    .card:hover {
      transform: scale(1.02);
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <h4 class="text-white text-center mb-4"><i class="fas fa-user-shield me-2"></i>Admin</h4>
    <a href="dashboard.html" class="active"><i class="fas fa-tachometer-alt me-2"></i>Dashboard</a>
    <a href="add-product.html"><i class="fas fa-plus me-2"></i>Add Product</a>
    <a href="list-products.html"><i class="fas fa-boxes me-2"></i>List Products</a>
    <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i>Logout</a>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <h2 class="mb-4"><i class="fas fa-chart-line me-2"></i>Dashboard Overview</h2>
    
    <div class="row g-4 text-white">
      <div class="col-md-3">
        <div class="card bg-primary text-center p-3" onclick="goTo('list-products.html')">
          <h4>Total Products</h4>
          <p id="totalProducts">0</p>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card bg-success text-center p-3" onclick="goTo('list-products.html')">
          <h4>Available</h4>
          <p id="availableProducts">0</p>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card bg-danger text-center p-3" onclick="goTo('list-products.html')">
          <h4>Not Available</h4>
          <p id="notAvailableProducts">0</p>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card bg-info text-center p-3" onclick="goTo('add-product.html')">
          <h4>Add Product</h4>
          <p class="mt-2">Click to add</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    function goTo(page) {
      window.location.href = page;
    }

    function logout() {
      alert("Logging out...");
      window.location.href = "login.html";
    }

    function updateDashboard() {
      const products = JSON.parse(localStorage.getItem('products')) || [];
      const total = products.length;
      const available = products.filter(p => p.status === 'available').length;
      const notAvailable = products.filter(p => p.status === 'not available').length;

      document.getElementById('totalProducts').innerText = total;
      document.getElementById('availableProducts').innerText = available;
      document.getElementById('notAvailableProducts').innerText = notAvailable;
    }

    window.onload = updateDashboard;
  </script>
</body>
</html>
